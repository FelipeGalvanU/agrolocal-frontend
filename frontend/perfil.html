<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Productor | AgroLocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-obscuro: #2d5a27;
            --verde-claro: #4caf50;
            --gris-suave: #f8f9fa;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--gris-suave); margin: 0; display: flex; flex-direction: column; color: #333; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; background: var(--verde-obscuro);
            height: 100vh; position: fixed; color: white;
            padding: 40px 25px; z-index: 100; transition: 0.3s;
        }
        .sidebar h2 span { color: var(--verde-claro); }
        .nav-links { margin-top: 30px; display: flex; flex-direction: column; }
        .nav-links a { color: white; text-decoration: none; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; }
        .nav-links a:hover { color: var(--verde-claro); }

        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 40px; transition: 0.3s; }

        @media (max-width: 992px) {
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
            .nav-links { flex-direction: row; justify-content: space-around; flex-wrap: wrap; }
            .nav-links a { border-bottom: none; padding: 10px; font-size: 0.8rem; }
        }

        .card {
            background: var(--blanco); border-radius: 20px;
            padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px; border: 1px solid #f0f0f0;
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid-inputs { grid-template-columns: 1fr; } }

        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; margin-top: 5px; font-family: inherit; }
        .prod-img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; background: #eee; display: block; margin: 5px auto; }

        #map { width: 100%; height: 300px; border-radius: 15px; margin-top: 15px; background: #ddd; }

        .btn-save {
            background: var(--verde-obscuro); color: white; border: none;
            padding: 20px; border-radius: 15px; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s;
        }
        .btn-save:hover { background: var(--verde-claro); transform: translateY(-2px); }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="index.html" style="text-decoration:none; color:white;"><h2>Agro<span>Local</span></h2></a>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="#" onclick="location.reload()">Mi Perfil</a>
            <a href="#" onclick="cerrarSesion()">Salir</a>
        </nav>
    </aside>

    <main class="main-content">
        <h2 id="saludoVendedor">Cargando perfil...</h2>
        
        <div class="card">
            <h3>Datos de la Granja</h3>
            <div class="grid-inputs">
                <div>
                    <label>Nombre del Negocio</label>
                    <input type="text" id="nombreNegocio" readonly style="background: #f9f9f9; cursor: not-allowed;">
                </div>
                <div>
                    <label>Encargado</label>
                    <input type="text" id="encargado" placeholder="Tu nombre">
                </div>
                <div>
                    <label>WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="8112345678">
                </div>
                <div>
                    <label>Productos (Resumen para catálogo)</label>
                    <input type="text" id="productos_resumen" placeholder="Miel, Queso, Huevo...">
                </div>
                <div style="grid-column: span 1;">
                    <label>Foto de Portada</label>
                    <input type="file" id="inputFile" accept="image/*" onchange="previewImg(this, 'prevGranja', 'base64Granja')">
                    <img id="prevGranja" src="https://via.placeholder.com/150" class="prod-img-preview" style="width:100%; height:150px; margin-top:10px; object-fit: cover;">
                    <input type="hidden" id="base64Granja">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>📍 Ubicación del Punto de Venta</h3>
            <p style="font-size: 0.8rem; color: #666;">Arrastra el marcador en el mapa o usa el botón GPS.</p>
            <button onclick="obtenerGPS()" style="padding:10px; margin: 10px 0; cursor:pointer; border-radius:8px; border:1px solid #ccc;">📍 Usar mi ubicación actual</button>
            <input type="text" id="coords" readonly placeholder="Latitud, Longitud">
            <div id="map"></div>
        </div>

        <button class="btn-save" id="btnGuardar" onclick="guardarTodo()"> GUARDAR TODOS LOS CAMBIOS</button>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD8woW6Hfqd2pzMFt9X2Rzgi5hdzR87tN4&callback=initMap" async defer></script>

    <script>
        const API_URL = 'http://localhost:3000'; 

        let map, marker;
        const vendedorEmail = localStorage.getItem('vendedor_email');

        // Seguridad: Bloqueo de acceso sin sesión
        if (!vendedorEmail || localStorage.getItem('sesion_activa') !== 'true') {
            window.location.href = 'login.html';
        }

        function initMap() {
            // Posición por defecto (García, NL o similar)
            let defaultPos = { lat: 25.81, lng: -100.58 };
            const guardadas = localStorage.getItem('vendedor_ubicacion');
            
            if(guardadas && guardadas.includes(',')) {
                const c = guardadas.split(',');
                defaultPos = { lat: parseFloat(c[0]), lng: parseFloat(c[1]) };
            }

            map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: defaultPos });
            marker = new google.maps.Marker({ position: defaultPos, map: map, draggable: true });

            marker.addListener('dragend', function() {
                const p = marker.getPosition();
                document.getElementById('coords').value = `${p.lat().toFixed(6)}, ${p.lng().toFixed(6)}`;
            });

            // Inicializar datos una vez que el mapa esté listo
            cargarDatosVendedor();
        }

        function cargarDatosVendedor() {
            document.getElementById('saludoVendedor').innerText = `Panel de: ${localStorage.getItem('vendedor_nombre') || 'Vendedor'}`;
            document.getElementById('nombreNegocio').value = localStorage.getItem('vendedor_nombre') || "";
            document.getElementById('encargado').value = localStorage.getItem('vendedor_encargado') || "";
            document.getElementById('whatsapp').value = localStorage.getItem('vendedor_whatsapp') || "";
            document.getElementById('productos_resumen').value = localStorage.getItem('vendedor_productos') || "";
            document.getElementById('coords').value = localStorage.getItem('vendedor_ubicacion') || "";
            
            const fotoGuardada = localStorage.getItem('vendedor_foto');
            if (fotoGuardada && fotoGuardada !== "null" && fotoGuardada !== "") {
                document.getElementById('prevGranja').src = fotoGuardada;
                document.getElementById('base64Granja').value = fotoGuardada;
            }
        }

        function previewImg(input, imgId, hiddenId) {
            const file = input.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    alert("⚠️ Imagen muy pesada. El límite es 2MB para evitar lentitud.");
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(imgId).src = e.target.result;
                    document.getElementById(hiddenId).value = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function obtenerGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const pos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    map.setCenter(pos); 
                    marker.setPosition(pos);
                    document.getElementById('coords').value = `${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
                }, () => alert("Error al obtener ubicación. Activa los permisos de GPS."));
            }
        }

        async function guardarTodo() {
            const btn = document.getElementById('btnGuardar');
            btn.innerText = "⏳ Guardando cambios...";
            btn.disabled = true;

            const datos = {
                email: vendedorEmail, 
                productos: document.getElementById('productos_resumen').value.trim(),
                ubicacion: document.getElementById('coords').value,
                whatsapp: document.getElementById('whatsapp').value.trim(),
                encargado: document.getElementById('encargado').value.trim(),
                foto_granja: document.getElementById('base64Granja').value || null 
            };

            try {
                const response = await fetch(`${API_URL}/api/actualizar-perfil`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    // Actualizamos localStorage con los nuevos valores
                    localStorage.setItem('vendedor_encargado', datos.encargado);
                    localStorage.setItem('vendedor_whatsapp', datos.whatsapp);
                    localStorage.setItem('vendedor_productos', datos.productos);
                    localStorage.setItem('vendedor_ubicacion', datos.ubicacion);
                    localStorage.setItem('vendedor_foto', datos.foto_granja);
                    
                    alert("✅ ¡Perfil actualizado correctamente!");
                    window.location.href = "index.html";
                } else {
                    const errorData = await response.json();
                    alert("❌ Error: " + (errorData.message || "No se pudo guardar"));
                }
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("⚠️ Error de conexión. Revisa los logs de Render.");
            } finally {
                btn.innerText = " GUARDAR TODOS LOS CAMBIOS";
                btn.disabled = false;
            }
        }

        function cerrarSesion() {
            if(confirm("¿Estás seguro que deseas salir?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
