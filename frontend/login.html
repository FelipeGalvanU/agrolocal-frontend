<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Vendedores | AgroLocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --verde-deep: #2d5a27; 
            --verde-glow: #4caf50;
            --rojo-alerta: #a62626; 
            --blanco-pure: #ffffff;
            --texto-suave: #666666;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1495107336079-eb8593763481?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.94); 
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--verde-deep), var(--verde-glow));
        }

        h2 { 
            color: var(--verde-deep); 
            margin-bottom: 8px; 
            font-weight: 700; 
            font-size: 2rem; 
            letter-spacing: -0.5px;
        }
        
        .subtitle { 
            color: var(--texto-suave); 
            margin-bottom: 35px; 
            font-size: 0.95rem; 
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .label-text { 
            display: block; 
            font-weight: 600; 
            font-size: 0.8rem; 
            color: #444; 
            margin-bottom: 8px; 
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            border: 1.5px solid #e0e0e0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--verde-glow); 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.15);
        }

        .btn-login { 
            width: 100%; 
            background: linear-gradient(135deg, var(--verde-deep), var(--verde-glow)); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .btn-login:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(45, 90, 39, 0.3); 
        }

        .btn-login:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg { 
            color: var(--rojo-alerta); 
            font-size: 0.85rem; 
            margin-top: 20px; 
            display: none; 
            background: #fff5f5; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #fed7d7;
        }

        .links-container { 
            margin-top: 30px; 
            border-top: 1.5px solid #eee; 
            padding-top: 20px; 
        }

        .footer-link { 
            display: inline-block; 
            color: var(--texto-suave); 
            text-decoration: none; 
            font-size: 0.9rem; 
            margin: 8px 0;
        }

        .footer-link strong { color: var(--verde-deep); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>AgroLocal</h2>
    <p class="subtitle">Acceso exclusivo para productores</p>
    
    <div class="input-group">
        <span class="label-text">Correo Electrónico</span>
        <input type="email" id="loginEmail" placeholder="ejemplo@correo.com" required>
    </div>
    
    <div class="input-group">
        <span class="label-text">Contraseña</span>
        <input type="password" id="loginPass" placeholder="••••••••" required>
    </div>
    
    <p id="error" class="error-msg"></p>
    
    <button id="btnEntrar" onclick="intentarLogin()" class="btn-login">INICIAR SESIÓN</button>
    
    <div class="links-container">
        <a href="registro.html" class="footer-link">¿Nuevo aquí? <strong>Crea tu cuenta</strong></a>
        <br>
        <a href="index.html" class="footer-link">← Volver al portal principal</a>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000'; 

    // Permitir Enter para iniciar sesión
    document.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') intentarLogin();
    });

    async function intentarLogin() {
        const emailInput = document.getElementById('loginEmail');
        const passInput = document.getElementById('loginPass');
        const errorMsg = document.getElementById('error');
        const btn = document.getElementById('btnEntrar');
        
        const email = emailInput.value.trim().toLowerCase();
        const password = passInput.value;

        // Reset de mensajes
        errorMsg.style.display = 'none';
        emailInput.style.borderColor = '#e0e0e0';
        passInput.style.borderColor = '#e0e0e0';

        if (!email || !password) {
            errorMsg.innerText = "Por favor, llena todos los campos.";
            errorMsg.style.display = 'block';
            return;
        }

        try {
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const response = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // GUARDADO DE DATOS (Vital para perfil.html)
                // Aseguramos que data.user existe antes de guardar
                if (data.user) {
                    localStorage.setItem('vendedor_nombre', data.user.nombre || "");
                    localStorage.setItem('vendedor_email', data.user.email || "");
                    localStorage.setItem('vendedor_productos', data.user.productos || "");
                    localStorage.setItem('vendedor_whatsapp', data.user.whatsapp || "");
                    localStorage.setItem('vendedor_ubicacion', data.user.ubicacion || "");
                    localStorage.setItem('vendedor_encargado', data.user.encargado || "");
                    localStorage.setItem('vendedor_foto', data.user.foto_granja || "");
                    localStorage.setItem('sesion_activa', 'true');
                    
                    window.location.href = 'perfil.html';
                }
            } else {
                throw new Error(data.message || "Correo o contraseña incorrectos.");
            }
        } catch (error) {
            btn.innerText = "INICIAR SESIÓN";
            btn.disabled = false;
            console.error("Error en login:", error);
            
            errorMsg.innerText = error.message.includes('fetch') 
                ? "⚠️ El servidor está despertando. Espera 15 segundos e intenta de nuevo." 
                : "❌ " + error.message;
            
            errorMsg.style.display = 'block';
            emailInput.style.borderColor = 'var(--rojo-alerta)';
            passInput.style.borderColor = 'var(--rojo-alerta)';
        }
    }
</script>
</body>
</html>
