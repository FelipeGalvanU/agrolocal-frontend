<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vendedor | AgroLocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-principal: #2d5a27;
            --verde-claro: #4caf50;
            --oscuro: #212121;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .contenedor-registro { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 480px; 
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            animation: slideUp 0.8s ease-out;
        }

        .contenedor-registro::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--verde-principal), var(--verde-claro));
            border-radius: 24px 24px 0 0;
        }

        h2 { color: var(--verde-principal); text-align: center; font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9rem; }
        
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.75rem; color: #444; text-transform: uppercase; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #e0e0e0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            transition: 0.3s;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            border-color: var(--verde-claro);
            outline: none;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
        }

        .btn-enviar { 
            width: 100%; 
            background: linear-gradient(135deg, var(--verde-principal), var(--verde-claro));
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-enviar:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(45, 90, 39, 0.3);
        }

        .btn-enviar:disabled {
            background: #9e9e9e !important;
            cursor: not-allowed;
            transform: none;
        }

        .volver { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            color: #666; 
            text-decoration: none; 
            font-size: 0.85rem; 
        }
        .volver strong { color: var(--verde-principal); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="contenedor-registro">
        <h2>Únete a AgroLocal</h2>
        <p class="subtitle">Registra tu huerto y conecta con clientes locales.</p>
        
        <form id="formRegistro">
            <div class="campo">
                <label>Nombre del Negocio</label>
                <input type="text" id="nombreNegocio" placeholder="Ej. Huerto Los Pinos" required>
            </div>

            <div class="campo">
                <label>Correo Electrónico</label>
                <input type="email" id="emailVendedor" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="campo">
                <label>Teléfono / WhatsApp</label>
                <input type="tel" id="telVendedor" placeholder="Ej. 8112345678" maxlength="10" required>
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="passVendedor" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="campo">
                <label>Productos (Separados por coma)</label>
                <textarea id="productosVendedor" rows="2" placeholder="Tomates, miel, huevos orgánicos..." required></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="btn-enviar">Registrarme Ahora</button>
        </form>

        <a href="login.html" class="volver">¿Ya tienes cuenta? <strong>Inicia sesión</strong></a>
    </div>

    <script>
        // URL DE TU API EN RENDER
        const API_URL = 'http://localhost:3000'; 

        const form = document.getElementById('formRegistro');
        const btn = document.getElementById('btnSubmit');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            // Captura de datos limpia
            const nombre = document.getElementById('nombreNegocio').value.trim();
            const email = document.getElementById('emailVendedor').value.toLowerCase().trim();
            const tel = document.getElementById('telVendedor').value.trim();
            const pass = document.getElementById('passVendedor').value;
            const productos = document.getElementById('productosVendedor').value.trim();

            if (pass.length < 6) {
                alert("⚠️ La contraseña debe tener al menos 6 caracteres.");
                return;
            }

            const datos = { nombre, email, password: pass, productos, whatsapp: tel };

            try {
                // Estado visual de carga
                btn.innerText = "⏳ CONECTANDO AL SERVIDOR...";
                btn.disabled = true;

                const response = await fetch(`${API_URL}/api/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ ¡Registro exitoso! Ya puedes iniciar sesión.");
                    window.location.href = 'login.html';
                } else {
                    // El servidor respondió con error (ej. correo duplicado)
                    alert("❌ Error: " + (result.message || "No se pudo completar el registro"));
                }

            } catch (error) {
                // AQUÍ CAE SI EL SERVIDOR ESTÁ DORMIDO
                console.error("Error en registro:", error);
                
                // Cambiamos el texto del botón para guiar al usuario
                btn.innerText = "🔄 REINTENTAR AHORA";
                btn.style.background = "linear-gradient(135deg, #f39c12, #e67e22)"; // Color naranja de espera
                
                alert("⚠️ El servidor de AgroLocal está despertando (esto toma 20 segundos).\n\nESPERA UN MOMENTO Y VUELVE A PRESIONAR EL BOTÓN.");
            } finally {
                btn.disabled = false;
                if(btn.innerText !== "🔄 REINTENTAR AHORA") {
                    btn.innerText = "Registrarme Ahora";
                    btn.style.background = ""; // Restaurar color verde original
                }
            }
        });

        // Solo números en el campo teléfono
        document.getElementById('telVendedor').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
